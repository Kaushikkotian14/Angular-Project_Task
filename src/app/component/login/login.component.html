<mat-card>
  <mat-card-header>
    <mat-card-title>Login</mat-card-title>
  </mat-card-header>
  <mat-card-content>
   <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <mat-form-field>
    <mat-label>UserName</mat-label>
    <input matInput placeholder="Enter your username" formControlName="username" />
  </mat-form-field><br>
  <mat-form-field>
  <mat-label>Password</mat-label>
  <input matInput type="password" placeholder="Enter your password" formControlName="password" />
</mat-form-field><br>
    <button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.valid">Login</button><br><br>
    <div> New User? <a routerLink="/register">Register here</a></div>
</form>

 
  </mat-card-content>
</mat-card>
