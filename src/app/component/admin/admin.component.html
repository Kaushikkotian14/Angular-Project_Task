    <app-table  [dataSource]="books" [displayedColumns]="colums" > </app-table> 

<mat-card>
  <mat-card-header>
    <mat-card-title>Add Books</mat-card-title>
  </mat-card-header>
  <mat-card-content>
   <form [formGroup]="form" (ngSubmit)="onSubmit()">
  <mat-form-field>
    <mat-label>Title</mat-label>
    <input matInput placeholder="Enter Title" formControlName="title" />
  </mat-form-field><br>
    <mat-form-field>
        <mat-label>Author</mat-label>
        <input matInput  placeholder="Enter Author's Name" formControlName="author" />
  </mat-form-field><br>
  <mat-form-field>
  <mat-label>Description</mat-label>
  <input matInput  placeholder="Description..." formControlName="description" />
</mat-form-field><br>
  <mat-form-field>
  <mat-label> Price</mat-label>
  <input matInput  type="number" placeholder="Enter Price" formControlName="price" />
</mat-form-field><br>
<mat-form-field>
  <mat-label> Quantity</mat-label>
  <input matInput type="number" placeholder="Enter Quantity" formControlName="quantity" />
</mat-form-field><br>
<mat-form-field>
  <mat-label> Image Url</mat-label>
  <input matInput  placeholder="Image url" formControlName="imgUrl" />
</mat-form-field><br>
    <button mat-raised-button color="primary" type="submit" [disabled]="!form.valid">Add</button><br><br>

</form>
